vrrp_instance VI_LICENSE {
    state MASTER
    interface eth0
    virtual_router_id 10
    priority 101
    advert_int 1
    virtual_ipaddress {
        192.168.100.10
    }
}

vrrp_instance VI_BACKUP {
    state MASTER
    interface eth0
    virtual_router_id 20
    priority 101
    advert_int 1
    virtual_ipaddress {
        192.168.100.20
    }
}
